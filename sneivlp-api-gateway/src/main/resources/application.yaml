server:
  port: 8080

spring:
  application:
    name: sneivlp-api-gateway

  cloud:
    gateway:
      routes:

        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/identity/**

        - id: registry-service
          uri: http://localhost:8082
          predicates:
            - Path=/registry/**

        - id: election-service
          uri: http://localhost:8083
          predicates:
            - Path=/elections/**

        - id: eligibility-service
          uri: http://localhost:8084
          predicates:
            - Path=/eligibility/**

        - id: vote-lock-service
          uri: http://localhost:8085
          predicates:
            - Path=/vote-lock/**

        - id: vote-service
          uri: http://localhost:8086
          predicates:
            - Path=/votes/**

        - id: fraud-service
          uri: http://localhost:8087
          predicates:
            - Path=/fraud/**

        - id: audit-service
          uri: http://localhost:8088
          predicates:
            - Path=/audit/**

        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/notifications/**